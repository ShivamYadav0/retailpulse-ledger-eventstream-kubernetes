apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-hba-config
  namespace: vani-ledger
data:
  pg_hba.conf: |
    # Local connections (trust for dev)
    local    all             all                                      trust
    host     all             all             127.0.0.1/32             trust
    host     all             all             ::1/128                  trust

    # Ledger user inside Kubernetes Pod Network (trust)
    host     ledger          ledger          10.0.0.0/8               trust

    # Ledger user inside Docker network (kept for compatibility)
    host     ledger          ledger          172.80.0.0/16            trust
    host     ledger          ledger          ::/0                     trust

    # Catchall for external connections (secure)
    host     all             all             0.0.0.0/0                scram-sha-256
    host     all             all             ::/0                     scram-sha-256